<!DOCTYPE html>
<html lang="ja">
<style>
    /* 基本設定 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.6;
    color: #333;
    scroll-behavior: smooth;
}

/* ヘッダー */
header {
    background: rgba(0, 0, 0, 0.9);
    color: #fff;
    padding: 1rem 0;
    position: fixed;
    width: 100%;
    z-index: 1000;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li a {
    color: #fff;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
    transition: 0.3s;
}

nav ul li a:hover {
    color: #ff3e3e; /* アクセントカラー */
}

/* ヒーローセクション */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                url('https://unsplash.com') no-repeat center center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
}

.hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 4rem;
    margin-bottom: 1rem;
    letter-spacing: 5px;
}

.btn {
    display: inline-block;
    background: #ff3e3e;
    color: #fff;
    padding: 12px 30px;
    text-decoration: none;
    border-radius: 5px;
    margin-top: 20px;
    transition: background 0.3s;
}

.btn:hover {
    background: #e63535;
}

/* 共通セクション */
.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 80px 20px;
    text-align: center;
}

.bg-light {
    background: #f4f4f4;
    max-width: 100%;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

footer {
    background: #222;
    color: #fff;
    text-align: center;
    padding: 40px 0;
}

/* レスポンシブ対応 */
@media (max-width: 768px) {
    .hero h1 { font-size: 2.5rem; }
    nav ul { display: none; } /* モバイル時はメニューを隠す（簡易版） */
}
</style>

</head>

    <header>

            </div>

</html>
